<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Starfield</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<script>
// ---------------------------------------------------------------------------
// Tweak everything here. Speeds are in pixels/second (CSS pixels, so they
// mean the same thing on Retina and non-Retina screens).
// ---------------------------------------------------------------------------
const CONFIG = {
  driftAngleDeg: 200,          // direction the field drifts (200 = down-left, slow "sky rotating" feel)
  layers: [
    // far -> near. More stars far away, moving slower = parallax depth.
    { count: 150, speed: 1.5, size: [0.4, 0.9], alpha: 0.45 },
    { count: 90,  speed: 3.0, size: [0.7, 1.4], alpha: 0.7  },
    { count: 40,  speed: 6.0, size: [1.1, 2.1], alpha: 1.0  },
  ],
  twinkle: {
    amount: 0.45,              // 0 = steady stars, 1 = full fade in/out
    speed: [0.15, 0.6],        // oscillations per second (min, max) — slow = calm
  },
  shootingStars: {
    enabled: true,
    everySeconds: [45, 120],   // random gap between shooting stars (min, max)
    speed: 900,                // px/s
    length: 140,               // trail length in px
  },
  // A tiny fraction of stars get a subtle color instead of pure white.
  palette: ['#ffffff', '#ffffff', '#ffffff', '#cfe2ff', '#ffe9c4', '#d8fbff'],
};
// ---------------------------------------------------------------------------

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const rand = (min, max) => min + Math.random() * (max - min);
const angle = CONFIG.driftAngleDeg * Math.PI / 180;
const dirX = Math.cos(angle), dirY = Math.sin(angle);

const stars = [];
for (const layer of CONFIG.layers) {
  for (let i = 0; i < layer.count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: rand(layer.size[0], layer.size[1]),
      speed: layer.speed,
      baseAlpha: layer.alpha * rand(0.6, 1),
      twinklePhase: Math.random() * Math.PI * 2,
      twinkleSpeed: rand(CONFIG.twinkle.speed[0], CONFIG.twinkle.speed[1]) * Math.PI * 2,
      color: CONFIG.palette[Math.floor(Math.random() * CONFIG.palette.length)],
    });
  }
}

let meteor = null;
let nextMeteorAt = performance.now() / 1000 + rand(...CONFIG.shootingStars.everySeconds);

function spawnMeteor(now) {
  const a = rand(Math.PI * 0.15, Math.PI * 0.35); // shallow downward diagonal
  meteor = {
    x: rand(W * 0.1, W * 0.9),
    y: rand(0, H * 0.4),
    dx: Math.cos(a) * (Math.random() < 0.5 ? 1 : -1),
    dy: Math.sin(a),
    life: 0,
    maxLife: rand(0.7, 1.2),
  };
  nextMeteorAt = now + rand(...CONFIG.shootingStars.everySeconds);
}

let last = performance.now();
function frame(nowMs) {
  const dt = Math.min((nowMs - last) / 1000, 0.1); // clamp: no jumps after sleep/wake
  last = nowMs;
  const now = nowMs / 1000;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    s.x += dirX * s.speed * dt;
    s.y += dirY * s.speed * dt;
    // wrap with a small margin so stars never pop in at a hard edge
    if (s.x < -4) s.x += W + 8; else if (s.x > W + 4) s.x -= W + 8;
    if (s.y < -4) s.y += H + 8; else if (s.y > H + 4) s.y -= H + 8;

    const tw = 1 - CONFIG.twinkle.amount * (0.5 + 0.5 * Math.sin(now * s.twinkleSpeed + s.twinklePhase));
    ctx.globalAlpha = s.baseAlpha * tw;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  if (CONFIG.shootingStars.enabled) {
    if (!meteor && now >= nextMeteorAt) spawnMeteor(now);
    if (meteor) {
      meteor.life += dt;
      meteor.x += meteor.dx * CONFIG.shootingStars.speed * dt;
      meteor.y += meteor.dy * CONFIG.shootingStars.speed * dt;
      const p = meteor.life / meteor.maxLife;
      const fade = p < 0.2 ? p / 0.2 : 1 - (p - 0.2) / 0.8; // quick fade-in, slow fade-out
      const tail = CONFIG.shootingStars.length;
      const grad = ctx.createLinearGradient(
        meteor.x, meteor.y,
        meteor.x - meteor.dx * tail, meteor.y - meteor.dy * tail
      );
      grad.addColorStop(0, `rgba(255,255,255,${0.9 * fade})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.globalAlpha = 1;
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(meteor.x, meteor.y);
      ctx.lineTo(meteor.x - meteor.dx * tail, meteor.y - meteor.dy * tail);
      ctx.stroke();
      if (p >= 1 || meteor.x < -tail || meteor.x > W + tail || meteor.y > H + tail) meteor = null;
    }
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
